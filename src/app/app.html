<div
  class="shell"
  appTechnicalGridSurface
  [appTechnicalGridDisabled]="!isSoftware() && !isContact()"
  [appTechnicalGridViewport]="true"
  [appTechnicalGridMode]="null"
  [appTechnicalGridCellSize]="isSoftware() || isContact() ? 18 : null"
  [class.shell--plain]="isHome()"
  [class.shell--software]="isSoftware()"
  [class.shell--contact]="isContact()"
>
  <header
    class="topbar"
    [class.topbar--home]="isHome()"
    [class.topbar--software]="isSoftware()"
    [class.topbar--back]="backOnly()"
  >
    @if (backOnly()) {
      <button class="topbar-back" type="button" (click)="goBack()" [attr.aria-label]="t().back">
        <svg lucideArrowLeft [size]="22" [strokeWidth]="1" aria-hidden="true"></svg>
      </button>
      <button
        type="button"
        class="lang-toggle"
        [class.is-en]="lang() === 'en'"
        role="switch"
        [attr.aria-checked]="lang() === 'en'"
        [attr.aria-label]="t().switchLang"
        (click)="toggleLang()"
      >
        <span class="lang-toggle__thumb" aria-hidden="true"></span>
        <span class="lang-toggle__opt" [class.is-active]="lang() === 'es'">ES</span>
        <span class="lang-toggle__opt" [class.is-active]="lang() === 'en'">EN</span>
      </button>
    } @else {
      <a class="brand" routerLink="/">sowe</a>

      @if (!isHome()) {
        <nav class="nav" aria-label="Primary">
          @for (link of navLinks(); track link.href) {
            <a class="nav-link" [href]="link.href">{{ link.label[lang()] }}</a>
            <span class="nav-dot" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </span>
          }
          <button
            type="button"
            class="lang-toggle"
            [class.is-en]="lang() === 'en'"
            role="switch"
            [attr.aria-checked]="lang() === 'en'"
            [attr.aria-label]="t().switchLang"
            (click)="toggleLang()"
          >
            <span class="lang-toggle__thumb" aria-hidden="true"></span>
            <span class="lang-toggle__opt" [class.is-active]="lang() === 'es'">ES</span>
            <span class="lang-toggle__opt" [class.is-active]="lang() === 'en'">EN</span>
          </button>
        </nav>
      }

      <div class="topbar-actions">
        <a
          class="wa-button"
          href="https://wa.me/5491133337180"
          target="_blank"
          rel="noopener noreferrer"
          [attr.aria-label]="t().whatsapp"
          (click)="onWhatsapp()"
        >
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" focusable="false">
            <path
              d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.149-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.71.306 1.263.489 1.694.625.712.227 1.36.195 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.885-9.885 9.885m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"
            />
          </svg>
        </a>

        @if (!isHome()) {
          <a class="button topbar-link" routerLink="/contacto">
            <span>{{ t().talk }}</span>
            <span class="button-arrow" aria-hidden="true">→</span>
          </a>
        }

        <a class="hs-button" routerLink="/contacto" [attr.aria-label]="t().talk">
          <svg lucideHeadset [size]="22" [strokeWidth]="1" aria-hidden="true"></svg>
        </a>
      </div>
    }
  </header>

  <main class="content" [class.content--software]="isSoftware()">
    <router-outlet />
  </main>
</div>
